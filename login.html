<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <title>登录 · 旅人教育课程资料库</title>
  <style>
    :root {
      --ink: #172033;
      --muted: #667085;
      --line: #dde3ec;
      --paper: #ffffff;
      --canvas: #f5f7fb;
      --surface: #eef4fb;
      --blue: #2364aa;
      --blue-dark: #184d84;
      --red: #ba3f3f;
      --shadow: 0 24px 60px rgba(31, 45, 69, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      background:
        linear-gradient(135deg, rgba(35, 100, 170, 0.08), transparent 35%),
        var(--canvas);
      color: var(--ink);
    }

    .login-shell {
      width: min(920px, 100%);
      display: grid;
      grid-template-columns: 1fr 410px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--paper);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .intro {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 520px;
      padding: 42px;
      background:
        linear-gradient(120deg, rgba(18, 42, 70, 0.94), rgba(35, 100, 170, 0.84)),
        #17304d;
      color: #ffffff;
    }

    .mark {
      width: 150px;
      height: auto;
      display: block;
      border-radius: 8px;
      box-shadow: 0 16px 32px rgba(5, 18, 34, 0.18);
    }

    .intro-illustration {
      width: 180px;
      height: 180px;
      object-fit: contain;
      margin-top: 30px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.16);
    }

    .intro h1 {
      max-width: 420px;
      margin-top: 74px;
      font-size: 38px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .intro p {
      max-width: 470px;
      margin-top: 16px;
      color: #dbe9f8;
      line-height: 1.8;
      font-size: 15px;
    }

    .intro-footer {
      color: #bdd4ed;
      font-size: 13px;
    }

    .login-card {
      padding: 42px 36px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-card h2 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 750;
    }

    input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 0 12px;
      color: var(--ink);
      background: #fbfcfe;
      font: inherit;
      font-size: 14px;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(35, 100, 170, 0.12);
      background: var(--paper);
    }

    input::placeholder {
      color: #98a2b3;
    }

    .error-msg {
      display: none;
      color: var(--red);
      font-size: 12px;
      margin-top: 5px;
    }

    .error-msg.show {
      display: block;
    }

    button {
      width: 100%;
      height: 44px;
      border: 1px solid var(--blue);
      border-radius: 7px;
      margin-top: 10px;
      background: var(--blue);
      color: #ffffff;
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease;
    }

    button:hover {
      background: var(--blue-dark);
      border-color: var(--blue-dark);
    }

    button:disabled {
      opacity: 0.62;
      cursor: wait;
    }

    .footer-text {
      margin-top: 22px;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
    }

    @media (max-width: 760px) {
      .login-shell {
        grid-template-columns: 1fr;
      }

      .intro {
        min-height: auto;
        padding: 30px 26px;
      }

      .intro h1 {
        margin-top: 34px;
        font-size: 30px;
      }

      .intro-footer {
        margin-top: 30px;
      }

      .login-card {
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>
  <main class="login-shell">
    <section class="intro" aria-label="课程介绍">
      <div>
        <img class="mark" src="assets/images/tabito-logo.jpg" alt="旅人教育" />
        <img class="intro-illustration" src="assets/images/tabito-illustration.jpg" alt="旅人教育课程插画" />
        <h1>旅人教育课程资料库</h1>
        <p>集中访问各科课堂板书、作业题、答案解析、课程录播和补充资料。请使用教师提供的账号进入。</p>
      </div>
      <div class="intro-footer">
        <div>中国旅人教育集団株式会社</div>
        <div>地址：〒164-0001 東京都中野区中野１丁目５５−３ フェリスビル 4F</div>
        <div>电话：080-6431-9082</div>
        <div>网页制作：营业部 刘可惟</div>
      </div>
    </section>

    <section class="login-card" aria-label="登录表单">
      <h2>学生登录</h2>
      <p class="subtitle">登录后即可查看课程资料。账号仅供内部学生使用。</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">用户名</label>
          <input id="username" type="text" placeholder="请输入用户名" autocomplete="username" required />
          <div class="error-msg" id="usernameError"></div>
        </div>

        <div class="form-group">
          <label for="password">密码</label>
          <input id="password" type="password" placeholder="请输入密码" autocomplete="current-password" required />
          <div class="error-msg" id="passwordError"></div>
        </div>

        <div class="error-msg" id="generalError"></div>
        <button type="submit" id="submitBtn">登录资料库</button>
      </form>

      <p class="footer-text">旅人教育 · 课程资料库</p>
    </section>
  </main>

  <script>
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const generalError = document.getElementById('generalError');
    const submitBtn = document.getElementById('submitBtn');

    const VALID_USERNAME = 'tabito';
    const VALID_PASSWORD = 'butsuri';

    if (localStorage.getItem('physicsSiteAuth') === 'true') {
      window.location.href = 'index.html';
    }

    function clearErrors() {
      generalError.classList.remove('show');
      generalError.textContent = '';
      document.getElementById('usernameError').classList.remove('show');
      document.getElementById('passwordError').classList.remove('show');
    }

    usernameInput.addEventListener('focus', clearErrors);
    passwordInput.addEventListener('focus', clearErrors);

    loginForm.addEventListener('submit', (event) => {
      event.preventDefault();
      clearErrors();

      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      if (!username) {
        document.getElementById('usernameError').textContent = '请输入用户名';
        document.getElementById('usernameError').classList.add('show');
        usernameInput.focus();
        return;
      }

      if (!password) {
        document.getElementById('passwordError').textContent = '请输入密码';
        document.getElementById('passwordError').classList.add('show');
        passwordInput.focus();
        return;
      }

      if (username === VALID_USERNAME && password === VALID_PASSWORD) {
        submitBtn.disabled = true;
        submitBtn.textContent = '登录中...';
        localStorage.setItem('physicsSiteAuth', 'true');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 300);
        return;
      }

      generalError.textContent = '用户名或密码不正确';
      generalError.classList.add('show');
      passwordInput.value = '';
      passwordInput.focus();
    });
  </script>
</body>
</html>
